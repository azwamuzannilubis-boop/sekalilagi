<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<script src="js/script.js"></script>
<script>
    function kirimPesan() {
        alert("Pesan berhasil dikirim!");
    }
</script>

<!-- NAVBAR -->
<header>
    <div class="logo">🌱Tani Sejahtera Library</div>
    <nav>
        <a href="index.html">Home</a>
        <a href="#" onclick="logout()" class="login-btn">Logout</a>
    </nav>
</header>

<!-- CONTACT -->
<section class="contact">
    <h2>Contact Us</h2>

    <div class="contact-container">
        <form class="contact-form" onsubmit="event.preventDefault(); kirimPesan();">

            <input type="email" placeholder="Email" required>
            <input type="text" placeholder="No Handphone" required>
            <textarea placeholder="Pesan" required></textarea>

            <button type="submit" class="btn">Kirim Pesan</button>

        </form>
    </div>
</section>

<!-- FOOTER -->
<footer>
    <h3>© 2026 Tani Sejahtera Library</h3>
    <p>Azwa Muzanni Lubis</p>
</footer>

</body>
</html>
